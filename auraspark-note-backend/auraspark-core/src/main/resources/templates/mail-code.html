<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auraspark 验证码</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:HarmonyOS_Sans_SC_Thin,-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;">
  <table role="presentation" style="width:100%;max-width:480px;margin:40px auto;background:#fff;border-collapse:collapse;">
    <tr>
      <td style="padding:48px 32px 24px;text-align:center;">
        <h1 style="margin:0;font-size:40px;font-weight:300;letter-spacing:10px;color:#000;">Auraspark</h1>
        <p style="margin:8px 0 0;color:#888;font-size:16px;letter-spacing:4px;">Where you walk, stars align.</p>
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px 32px;text-align:center;">
        <p style="margin:0 0 24px;font-size:16px;color:#333;">您的验证码为</p>
        <div style="font-size:32px;font-weight:300;letter-spacing:18px;color:#000;padding:24px;background:#fafafa;font-family:HarmonyOS_Sans_SC_Thin,'Courier New',monospace;">
          {code}
        </div>
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px 40px;text-align:center;">
        <p style="margin:0;font-size:12px;color:#999;">验证码5分钟内有效，请勿泄露给他人</p>
        <p style="margin:8px 0 0;font-size:11px;color:#bbb;">如果这不是您的操作，请忽略此邮件</p>
      </td>
    </tr>
  </table>
</body>
</html>
